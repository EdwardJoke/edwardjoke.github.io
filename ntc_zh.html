<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>九井棋 — 开始游戏</title>
    <link rel="icon" href="assets/Edward.png">
    <link rel="stylesheet" href="assets/ntc.css">
</head>

<body>
    <main>
        <div class="chrome top">
            <div>EDWARD — 2026 · PORTFOLIO</div>
            <div class="right">
                <div class="rule"></div><a href="ntcr_zh.html" style="color:inherit;text-decoration:none">规则</a><a href="ntc.html" style="color:inherit;text-decoration:none;letter-spacing:0">EN</a>
            </div>
        </div>

        <div class="game-wrap" id="app">
            <div class="status" id="status">
                <span class="accent">X</span> 的回合
                <span class="mute">点击任意空格开始</span>
            </div>

            <div class="mode-toggle">
                <button class="active" data-mode="pvp">人人</button>
                <button data-mode="pvai">人机</button>
            </div>

            <div class="board" id="board"></div>

            <div class="win-overlay" id="winOverlay">
                <div class="text" id="winText"></div>
                <div class="sub">游戏结束</div>
                <button class="btn-ink overlay-btn" id="againBtn">再来一局</button>
            </div>

            <div class="controls">
                <button class="btn-ink" id="resetBtn">新游戏</button>
            </div>
        </div>

        <div class="chrome bot">
            <div>EDWARD · BUILDING TOOLS FOR THE NEXT ERA</div>
            <div><a href="index_zh.html" style="color:inherit;text-decoration:none">首页</a></div>
        </div>
    </main>

    <script src="assets/ntc_zh.js"></script>
</body>

</html>
