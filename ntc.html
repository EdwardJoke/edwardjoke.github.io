<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ultimate Tic-Tac-Toe — Play</title>
    <link rel="icon" href="assets/Edward.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist+Pixel&display=swap');

        @font-face {
            font-family: 'Zpix';
            src: url('https://cdn.jsdelivr.net/npm/zpix-pixel-font@3.1.10/website/zpix.woff2') format('woff2');
        }

        :root {
            --paper: #f3eee5;
            --ink: #1a1816;
            --muted: #7a766c;
            --accent: #c0563b;
            --serif: 'Cormorant Garamond', 'Iowan Old Style', Georgia, serif;
            --mono: 'Geist Pixel', ui-monospace, monospace;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            height: 100%;
        }

        body {
            background: var(--paper);
            color: var(--ink);
            font: 14px/1.5 -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        main {
            position: relative;
            width: 100vw;
            height: 100vh;
            background:
                radial-gradient(circle at 50% 50%, rgba(26, 24, 22, 0.04), transparent 70%),
                radial-gradient(circle, rgba(26, 24, 22, 0.10) 1px, transparent 1.4px) 0 0 / 28px 28px,
                var(--paper);
            overflow: hidden;
            font-variation-settings: "ELSH" 1;
        }

        .chrome {
            position: absolute;
            left: 36px;
            right: 36px;
            font: 10px/1.4 var(--mono);
            color: var(--muted);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            z-index: 10;
        }

        .chrome.top {
            top: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chrome.top .right {
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .chrome.top .right a {
            transition: opacity 0.2s;
        }

        .chrome.top .right a:hover {
            opacity: 0.55;
        }

        a[href]::after {
            display: inline-block;
            width: 10px;
            height: 10px;
            margin-left: 3px;
            content: '';
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9ImN1cnJlbnRDb2xvciIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiIGNsYXNzPSJsdWNpZGUgbHVjaWRlLXNxdWFyZS1hcnJvdy1vdXQtdXAtcmlnaHQtaWNvbiBsdWNpZGUtc3F1YXJlLWFycm93LW91dC11cC1yaWdodCI+PHBhdGggZD0iTTIxIDEzdjZhMiAyIDAgMCAxLTIgMkg1YTIgMiAwIDAgMS0yLTJWNWEyIDIgMCAwIDEgMi0yaDYiLz48cGF0aCBkPSJtMjEgMy05IDkiLz48cGF0aCBkPSJNMTUgM2g2djYiLz48L3N2Zz4=') no-repeat center/contain;
            vertical-align: middle;
            opacity: 0.55;
        }

        .chrome.top .right a:last-child::after {
            display: none;
        }

        .chrome.top .rule {
            width: 60px;
            height: 1px;
            background: var(--ink);
            opacity: 0.6;
        }

        .chrome.bot {
            bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .game-wrap {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .status {
            font: clamp(16px, 2.5vw, 28px)/1.2 var(--serif);
            font-style: italic;
            letter-spacing: -0.005em;
            margin-bottom: 14px;
            text-align: center;
            transition: opacity 0.3s;
        }

        .status .accent {
            color: var(--accent);
        }

        .status .mute {
            font: 10px/1.4 var(--mono);
            font-style: normal;
            color: var(--muted);
            letter-spacing: 0.12em;
            display: block;
            margin-top: 4px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            width: min(56vh, 56vw, 520px);
            aspect-ratio: 1;
            position: relative;
        }

        .board.disabled {
            pointer-events: none;
        }

        .mini {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: rgba(26, 24, 22, 0.08);
            padding: 4px;
            border-radius: 3px;
            position: relative;
            transition: background 0.25s;
        }

        .mini.active {
            background: rgba(192, 86, 59, 0.15);
            box-shadow: 0 0 0 2px var(--accent);
        }

        .cell {
            aspect-ratio: 1;
            background: var(--paper);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            transition: background 0.15s;
            user-select: none;
            -webkit-user-select: none;
        }

        .cell::after {
            content: attr(data-mark);
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font: clamp(9px, 1.1vw, 16px)/1 var(--mono);
            color: var(--ink);
        }

        .cell.x::after {
            color: var(--accent);
        }

        .cell.o::after {
            color: var(--ink);
        }

        .cell:hover:not(.set) {
            background: rgba(192, 86, 59, 0.10);
        }

        .cell.set {
            cursor: default;
        }

        .mini.won-x {
            background: var(--accent);
        }

        .mini.won-x .cell,
        .mini.won-o .cell {
            opacity: 0;
        }

        .mini.won-x::after,
        .mini.won-o::after {
            content: attr(data-mark);
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font: clamp(14px, 2vw, 28px)/1 var(--mono);
            color: var(--paper);
        }

        .mini.won-o::after {
            color: var(--ink);
        }

        .mini.won-o {
            background: rgba(26, 24, 22, 0.12);
        }

        .mini.draw {
            background: rgba(26, 24, 22, 0.06);
        }

        .mini.draw .cell {
            opacity: 0.2;
        }

        .controls {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .controls a,
        .controls button {
            font: 10px/1 var(--mono);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 3px;
            transition: opacity 0.2s;
            text-decoration: none;
        }

        .controls a:hover,
        .controls button:hover {
            opacity: 0.65;
        }

        .controls .btn-ink {
            background: var(--ink);
            color: var(--paper);
            border-radius: 4px;
        }

        .controls .btn-ink:hover {
            opacity: 0.85;
        }

        .mode-toggle {
            display: flex;
            border: 1px solid rgba(26, 24, 22, 0.18);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .mode-toggle button {
            font: 9px/1 var(--mono);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 5px 14px;
            border: none;
            background: none;
            color: var(--muted);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .mode-toggle button.active {
            background: var(--ink);
            color: var(--paper);
        }

        .mode-toggle button:not(.active):hover {
            background: rgba(26, 24, 22, 0.06);
        }

        .win-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(243, 238, 229, 0.88);
            z-index: 5;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .win-overlay.show {
            display: flex;
        }

        .win-overlay .text {
            font: clamp(24px, 4vw, 48px)/1.1 var(--serif);
            font-style: italic;
            letter-spacing: -0.005em;
            margin-bottom: 16px;
            animation: type-in 0.8s cubic-bezier(.2, .7, .2, 1) both;
        }

        .win-overlay .sub {
            font: 10px/1.4 var(--mono);
            color: var(--muted);
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .win-overlay .overlay-btn {
            margin-top: 24px;
            background: var(--ink);
            color: var(--paper);
            border: none;
            border-radius: 4px;
            padding: 10px 24px;
            font: 10px/1 var(--mono);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .win-overlay .overlay-btn:hover {
            opacity: 0.85;
        }

        @keyframes type-in {
            from {
                opacity: 0;
                letter-spacing: 0.06em;
            }
            to {
                opacity: 1;
                letter-spacing: -0.005em;
            }
        }

        @media (max-width: 900px) {
            .chrome {
                left: 20px;
                right: 20px;
            }
            .board {
                width: min(44vh, 72vw);
            }
        }

        @media (max-height: 700px) {
            .board {
                width: min(38vh, 52vw);
            }
            .status {
                font-size: clamp(14px, 2vw, 18px);
                margin-bottom: 8px;
            }
            .controls {
                margin-top: 8px;
            }
        }
    </style>
</head>

<body>
    <main>
        <div class="chrome top">
            <div>EDWARD — 2026 · PORTFOLIO</div>
            <div class="right">
                <div class="rule"></div><a href="ntcr.html" style="color:inherit;text-decoration:none">RULES</a><a href="ntc_zh.html" style="color:inherit;text-decoration:none;font-family:'Zpix',monospace;letter-spacing:0">中文</a>
            </div>
        </div>

        <div class="game-wrap" id="app">
            <div class="status" id="status">
                <span class="accent">X</span>'s turn
                <span class="mute">click any free cell to begin</span>
            </div>

            <div class="mode-toggle">
                <button class="active" data-mode="pvp">PvP</button>
                <button data-mode="pvai">AI</button>
            </div>

            <div class="board" id="board"></div>

            <div class="win-overlay" id="winOverlay">
                <div class="text" id="winText"></div>
                <div class="sub">game over</div>
                <button class="btn-ink overlay-btn" id="againBtn">Play Again</button>
            </div>

            <div class="controls">
                <button class="btn-ink" id="resetBtn">New Game</button>
            </div>
        </div>

        <div class="chrome bot">
            <div>EDWARD · BUILDING TOOLS FOR THE NEXT ERA</div>
            <div><a href="index.html" style="color:inherit;text-decoration:none">HOME</a></div>
        </div>
    </main>

    <script>
        const WIN = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        let state;

        function init() {
            const mode = document.querySelector('.mode-toggle .active')?.dataset.mode || 'pvp';
            state = {
                cells: Array(9).fill(null).map(() => Array(9).fill(null)),
                winners: Array(9).fill(null),
                player: 'X',
                active: null,
                over: false,
                result: null,
                moves: 0,
                mode: mode,
                thinking: false
            };
            render();
        }

        function checkWin(arr) {
            for (const p of WIN) {
                const [a, b, c] = p;
                if (arr[a] && arr[a] === arr[b] && arr[a] === arr[c]) return arr[a];
            }
            return null;
        }

        function isFull(arr) {
            return arr.every(c => c !== null);
        }

        function play(bi, ci) {
            if (state.over || state.thinking) return;
            if (state.winners[bi]) return;
            if (state.cells[bi][ci] !== null) return;
            if (state.active !== null && state.active !== bi) return;

            state.cells[bi][ci] = state.player;
            state.moves++;

            const miniWin = checkWin(state.cells[bi]);
            if (miniWin) {
                state.winners[bi] = miniWin;
            } else if (isFull(state.cells[bi])) {
                state.winners[bi] = 'draw';
            }

            if (state.winners[bi] === 'X' || state.winners[bi] === 'O') {
                const macroWin = checkWin(state.winners);
                if (macroWin) {
                    state.over = true;
                    state.result = macroWin;
                    render();
                    return;
                }
            }

            if (state.moves >= 81 || state.winners.every(w => w !== null)) {
                state.over = true;
                state.result = 'draw';
                render();
                return;
            }

            const next = ci;
            if (state.winners[next]) {
                state.active = null;
            } else {
                state.active = next;
            }

            state.player = state.player === 'X' ? 'O' : 'X';
            render();
            triggerAI();
        }

        function triggerAI() {
            if (state.over || state.player !== 'O' || state.mode !== 'pvai') return;
            state.thinking = true;
            setTimeout(() => { aiMove(); state.thinking = false; }, 300);
        }

        function aiMove() {
            if (state.over || state.player !== 'O') return;
            state.thinking = false;
            const bi = state.active !== null ? state.active : bestBoard();
            const ci = bestCell(bi);
            if (ci !== -1) play(bi, ci);
        }

        function bestBoard() {
            let bestScore = -Infinity, picks = [];
            for (let b = 0; b < 9; b++) {
                if (state.winners[b]) continue;
                const s = scoreBoard(b);
                if (s > bestScore) { bestScore = s; picks = [b]; }
                else if (s === bestScore) picks.push(b);
            }
            return picks.length ? picks[Math.floor(Math.random() * picks.length)] : 4;
        }

        function scoreBoard(b) {
            const saved = state.winners[b];
            let score = 50;

            // Win macro game by taking this board
            state.winners[b] = 'O';
            if (checkWin(state.winners) === 'O') { state.winners[b] = saved; return 10000; }
            const oForks = countThreats('O');
            state.winners[b] = saved;

            // Block opponent macro win
            state.winners[b] = 'X';
            const blocksWin = checkWin(state.winners) === 'X' ? 5000 : 0;
            const xForks = countThreats('X');
            state.winners[b] = saved;

            score += blocksWin;
            score += oForks * 300;
            if (xForks > 1) score -= 200;

            // Position preference
            if (b === 4) score += 10;
            else if (b % 2 === 0) score += 5;

            // Board strength evaluation
            score += boardStrength(b, 'O') * 2;
            score -= boardStrength(b, 'X');

            return score;
        }

        function countThreats(player) {
            let count = 0;
            for (const p of WIN) {
                let pCount = 0, eCount = 0;
                for (const idx of p) {
                    if (state.winners[idx] === player) pCount++;
                    else if (state.winners[idx] === null) eCount++;
                }
                if (pCount === 2 && eCount === 1) count++;
            }
            return count;
        }

        function boardStrength(b, player) {
            const board = state.cells[b];
            let score = 0;
            for (const p of WIN) {
                let pCount = 0, blocked = false;
                for (const idx of p) {
                    if (board[idx] === player) pCount++;
                    else if (board[idx] !== null) blocked = true;
                }
                if (!blocked) {
                    if (pCount === 2) score += 10;
                    else if (pCount === 1) score += 2;
                }
            }
            return score;
        }

        function bestCell(boardIndex) {
            const board = state.cells[boardIndex];
            let bestScore = -Infinity, bestIdx = -1;
            for (let i = 0; i < 9; i++) {
                if (board[i] !== null) continue;
                board[i] = 'O';
                const s = miniMax(board, 'X', -Infinity, Infinity);
                board[i] = null;
                const bonus = sendPenalty(i);
                const total = s * 100 + bonus;
                if (total > bestScore) { bestScore = total; bestIdx = i; }
            }
            return bestIdx !== -1 ? bestIdx : board.indexOf(null);
        }

        function sendPenalty(cellIndex) {
            const target = cellIndex;
            if (state.winners[target]) return -50;
            let p = 0;
            p -= boardStrength(target, 'X') * 3;
            p += boardStrength(target, 'O') * 2;
            if (target === 4) p -= 5;
            return p;
        }

        function miniMax(board, player, alpha, beta) {
            const w = checkWin(board);
            if (w === 'O') return 10;
            if (w === 'X') return -10;
            if (board.every(c => c !== null)) return 0;

            if (player === 'O') {
                let best = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] !== null) continue;
                    board[i] = 'O';
                    const s = miniMax(board, 'X', alpha, beta);
                    board[i] = null;
                    best = Math.max(best, s);
                    alpha = Math.max(alpha, s);
                    if (beta <= alpha) break;
                }
                return best;
            } else {
                let best = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] !== null) continue;
                    board[i] = 'X';
                    const s = miniMax(board, 'O', alpha, beta);
                    board[i] = null;
                    best = Math.min(best, s);
                    beta = Math.min(beta, s);
                    if (beta <= alpha) break;
                }
                return best;
            }
        }

        function render() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            board.className = 'board' + (state.over ? ' disabled' : '');

            for (let bi = 0; bi < 9; bi++) {
                const mini = document.createElement('div');
                mini.className = 'mini';
                if (state.active === bi && !state.over) mini.classList.add('active');
                if (state.winners[bi] === 'X') { mini.classList.add('won-x');
                    mini.dataset.mark = 'X'; }
                if (state.winners[bi] === 'O') { mini.classList.add('won-o');
                    mini.dataset.mark = 'O'; }
                if (state.winners[bi] === 'draw') mini.classList.add('draw');

                for (let ci = 0; ci < 9; ci++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const val = state.cells[bi][ci];
                    if (val) {
                        cell.classList.add('set', val.toLowerCase());
                        cell.dataset.mark = val;
                    }
                    cell.addEventListener('click', () => play(bi, ci));
                    mini.appendChild(cell);
                }
                board.appendChild(mini);
            }

            const el = document.getElementById('status');
            if (state.over) {
                if (state.result === 'draw') {
                    el.innerHTML = `<span class="accent">Draw</span><span class="mute">the board is full</span>`;
                } else {
                    el.innerHTML =
                        `<span class="accent">${state.result}</span> wins<span class="mute">three in a row on the macro board</span>`;
                }
                document.getElementById('winText').textContent = state.result === 'draw' ? 'It\'s a draw' :
                    `${state.result} takes it`;
                document.getElementById('winOverlay').classList.add('show');
            } else {
                document.getElementById('winOverlay').classList.remove('show');
                const hint = state.active === null ?
                    'choose any free board' :
                    `play in board ${state.active + 1}`;
                el.innerHTML =
                    `<span class="accent">${state.player}</span>'s turn<span class="mute">${hint}</span>`;
            }
        }

        document.querySelectorAll('.mode-toggle button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                init();
            });
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('winOverlay').classList.remove('show');
            init();
        });

        document.getElementById('againBtn').addEventListener('click', () => {
            document.getElementById('winOverlay').classList.remove('show');
            init();
        });

        init();
    </script>
</body>

</html>
