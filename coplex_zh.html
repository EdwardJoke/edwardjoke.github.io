<!doctype html>
<html lang="zh">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>我正在进行的工作 — Edward</title>
    <link rel="icon" href="assets/Edward.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist+Pixel&display=swap');

        @font-face {
            font-family: 'Zpix';
            src: url('https://cdn.jsdelivr.net/npm/zpix-pixel-font@3.1.10/website/zpix.woff2') format('woff2');
        }

        :root {
            --paper: #f3eee5;
            --ink: #1a1816;
            --muted: #7a766c;
            --accent: #c0563b;
            --serif: 'Cormorant Garamond', 'Iowan Old Style', Georgia, serif;
            --mono: 'Geist Pixel', ui-monospace, monospace;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            height: 100%;
        }

        body {
            background: var(--paper);
            color: var(--ink);
            font: 14px/1.5 -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        main {
            position: relative;
            width: 100vw;
            height: 100vh;
            background:
                radial-gradient(circle at 50% 50%, rgba(26, 24, 22, 0.04), transparent 70%),
                radial-gradient(circle, rgba(26, 24, 22, 0.10) 1px, transparent 1.4px) 0 0 / 28px 28px,
                var(--paper);
            overflow: hidden;
            font-variation-settings: "ELSH" 1;
        }

        .chrome {
            position: absolute;
            left: 36px;
            right: 36px;
            font: 10px/1.4 var(--mono);
            color: var(--muted);
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .chrome.top {
            top: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chrome.top .right {
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .chrome.top .right a {
            transition: opacity 0.2s;
        }

        .chrome.top .right a:hover {
            opacity: 0.55;
        }

        a[href]::after {
            display: inline-block;
            width: 10px;
            height: 10px;
            margin-left: 3px;
            content: '';
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9ImN1cnJlbnRDb2xvciIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiIGNsYXNzPSJsdWNpZGUgbHVjaWRlLXNxdWFyZS1hcnJvdy1vdXQtdXAtcmlnaHQtaWNvbiBsdWNpZGUtc3F1YXJlLWFycm93LW91dC11cC1yaWdodCI+PHBhdGggZD0iTTIxIDEzdjZhMiAyIDAgMCAxLTIgMkg1YTIgMiAwIDAgMS0yLTJWNWEyIDIgMCAwIDEgMi0yaDYiLz48cGF0aCBkPSJtMjEgMy05IDkiLz48cGF0aCBkPSJNMTUgM2g2djYiLz48L3N2Zz4=') no-repeat center/contain;
            vertical-align: middle;
            opacity: 0.55;
        }

        .chrome.top .right a:last-child::after {
            display: none;
        }

        .chrome.top .rule {
            width: 60px;
            height: 1px;
            background: var(--ink);
            opacity: 0.6;
        }

        .chrome.bot {
            bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .stage {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            pointer-events: none;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            max-width: 640px;
            width: 90vw;
            animation: fade-up 0.8s cubic-bezier(.2, .7, .2, 1) both;
        }

        .card {
            background: rgba(26, 24, 22, 0.04);
            border: 1px solid rgba(26, 24, 22, 0.12);
            border-radius: 12px;
            padding: 24px;
            transition: border-color 0.25s, background 0.25s;
        }

        .card:hover {
            border-color: rgba(192, 86, 59, 0.35);
            background: rgba(192, 86, 59, 0.04);
        }

        .card .tag {
            font: 9px/1.3 var(--mono);
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            margin-bottom: 8px;
        }

        .card h2 {
            font: 20px/1.2 var(--serif);
            font-style: italic;
            margin: 0 0 6px;
            color: var(--ink);
            font-weight: normal;
        }

        .card p {
            font: 13px/1.5 -apple-system, system-ui, sans-serif;
            color: var(--muted);
            margin: 0;
        }

        .meta-tl {
            position: absolute;
            top: 96px;
            left: 56px;
            font: 10px/1.5 var(--mono);
            color: var(--muted);
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .meta-tl b {
            display: block;
            color: var(--ink);
            margin-bottom: 4px;
            letter-spacing: 0.12em;
        }

        .issue {
            position: absolute;
            top: 96px;
            right: 56px;
            font: 9px/1.3 var(--mono);
            color: var(--muted);
            letter-spacing: 0.18em;
            text-align: right;
            text-transform: uppercase;
        }

        .issue .num {
            font: 18px/1 var(--serif);
            font-style: italic;
            color: var(--ink);
            display: block;
            letter-spacing: 0;
            margin-bottom: 4px;
        }

        .headline {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            text-align: center;
            max-width: 70vw;
            margin: 0 auto;
            font: clamp(22px, 4vw, 42px)/1.15 var(--serif);
            letter-spacing: -0.005em;
            animation: type-in 1.4s cubic-bezier(.2, .7, .2, 1) both;
        }

        .headline .em {
            font-style: italic;
            color: var(--ink);
        }

        .headline .accent {
            font-style: italic;
            color: var(--accent);
            padding-left: 4px;
        }

        .baseline {
            position: absolute;
            bottom: 56px;
            left: 36px;
            right: 36px;
            height: 1px;
            background: rgba(26, 24, 22, 0.25);
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes type-in {
            from {
                opacity: 0;
                letter-spacing: 0.06em;
            }
            to {
                opacity: 1;
                letter-spacing: -0.005em;
            }
        }

        @media (max-width: 900px) {
            .meta-tl {
                left: 20px;
            }
            .issue {
                right: 20px;
            }
            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>

<body>
    <main>
        <div class="chrome top">
            <div>EDWARD — 2026 · 项目</div>
            <div class="right">
                <div class="rule"></div><a href="mailto:edu1161108011@outlook.com"
                    style="color:inherit;text-decoration:none">CONTACT</a><a href="https://github.com/EdwardJoke"
                    style="color:inherit;text-decoration:none">GITHUB</a><a href="coplex.html"
                    style="color:inherit;text-decoration:none">English</a>
            </div>
        </div>

        <div class="meta-tl">
            <b>当前焦点</b>
            2026
        </div>
        <div class="issue">
            <span class="num">*</span>
            进行中
        </div>

        <div class="stage">
            <div class="grid">
                <div class="card">
                    <div class="tag">项目 01</div>
                    <h2>AI 开发者工具</h2>
                    <p>构建能自主编写、审查和交付代码的智能体。</p>
                </div>
                <div class="card">
                    <div class="tag">项目 02</div>
                    <h2>下一代交互界面</h2>
                    <p>探索人类与智能交互的新方式——超越聊天框。</p>
                </div>
                <div class="card">
                    <div class="tag">项目 03</div>
                    <h2>开源基础设施</h2>
                    <p>让任何人都能轻松构建和规模化部署的工具。</p>
                </div>
                <div class="card">
                    <div class="tag">项目 04</div>
                    <h2>学习系统</h2>
                    <p>适配你学习方式的平台，而非让你去适应它。</p>
                </div>
            </div>
        </div>

        <div class="headline">
            <span class="em">我</span>正在<span class="accent">进行的工作。</span>
        </div>
        <div class="baseline"></div>

        <div class="chrome bot">
            <div>Edward · 为下一个时代构建工具</div>
            <div>开放合作 / 2026</div>
        </div>
    </main>
</body>

</html>
