<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edward — Building tools for the next era</title>
    <link rel="icon" href="assets/Edward.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist+Pixel&display=swap');

        @font-face {
            font-family: 'Zpix';
            src: url('https://cdn.jsdelivr.net/npm/zpix-pixel-font@3.1.10/website/zpix.woff2') format('woff2');
        }

        :root {
            --paper: #f3eee5;
            --ink: #1a1816;
            --muted: #7a766c;
            --accent: #c0563b;
            --serif: 'Cormorant Garamond', 'Iowan Old Style', Georgia, serif;
            --mono: 'Geist Pixel', ui-monospace, monospace;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            height: 100%;
        }

        body {
            background: var(--paper);
            color: var(--ink);
            font: 14px/1.5 -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        main {
            position: relative;
            width: 100vw;
            height: 100vh;
            background:
                radial-gradient(circle at 50% 50%, rgba(26, 24, 22, 0.04), transparent 70%),
                radial-gradient(circle, rgba(26, 24, 22, 0.10) 1px, transparent 1.4px) 0 0 / 28px 28px,
                var(--paper);
            overflow: hidden;
            font-variation-settings: "ELSH" 1;
        }

        .chrome {
            position: absolute;
            left: 36px;
            right: 36px;
            font: 10px/1.4 var(--mono);
            color: var(--muted);
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .chrome.top {
            top: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chrome.top .right {
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .chrome.top .right a {
            transition: opacity 0.2s;
        }

        .chrome.top .right a:hover {
            opacity: 0.55;
        }

        a[href]::after {
            display: inline-block;
            width: 10px;
            height: 10px;
            margin-left: 3px;
            content: '';
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9ImN1cnJlbnRDb2xvciIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiIGNsYXNzPSJsdWNpZGUgbHVjaWRlLXNxdWFyZS1hcnJvdy1vdXQtdXAtcmlnaHQtaWNvbiBsdWNpZGUtc3F1YXJlLWFycm93LW91dC11cC1yaWdodCI+PHBhdGggZD0iTTIxIDEzdjZhMiAyIDAgMCAxLTIgMkg1YTIgMiAwIDAgMS0yLTJWNWEyIDIgMCAwIDEgMi0yaDYiLz48cGF0aCBkPSJtMjEgMy05IDkiLz48cGF0aCBkPSJNMTUgM2g2djYiLz48L3N2Zz4=') no-repeat center/contain;
            vertical-align: middle;
            opacity: 0.55;
        }

        .issue .num a::after,
        .chrome.top .right a:last-child::after,
        .chrome.top .right a.no-ext::after {
            display: none;
        }

        .chrome.top .rule {
            width: 60px;
            height: 1px;
            background: var(--ink);
            opacity: 0.6;
        }

        .chrome.bot {
            bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .stage {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            pointer-events: none;
        }

        .composition {
            position: relative;
            width: min(60vh, 60vw);
            aspect-ratio: 1 / 1;
            top: -7vh;
        }

        .ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(26, 24, 22, 0.45);
            animation: spin 60s linear infinite;
        }

        .ring.r2 {
            inset: 4%;
            border-color: rgba(26, 24, 22, 0.30);
            animation-duration: 90s;
            animation-direction: reverse;
        }

        .ring.r3 {
            inset: 10%;
            border-color: rgba(26, 24, 22, 0.22);
            border-style: dashed;
            animation-duration: 180s;
        }

        .ring.r4 {
            inset: 18%;
            border-color: rgba(26, 24, 22, 0.12);
            animation-duration: 36s;
        }

        .ring-labels {
            position: absolute;
            inset: 0;
            animation: spin 60s linear infinite;
            top: -15vh;
            pointer-events: none;
        }

        .ring-labels span {
            position: absolute;
            left: 50%;
            top: 50%;
            font: 18px/1 'Geist Pixel', monospace;
            font-variation-settings: "ELSH" 1;
            color: var(--ink);
            letter-spacing: 0.02em;
            transform-origin: 0 0;
            white-space: nowrap;
            text-transform: uppercase;
        }

        .ring-labels span.l1 {
            transform: rotate(-12deg) translate(0, -38vh);
        }

        .ring-labels span.l2 {
            transform: rotate(34deg) translate(0, -38vh);
        }

        .ring-labels span.l3 {
            transform: rotate(78deg) translate(0, -38vh);
        }

        .ring-labels span.l4 {
            transform: rotate(132deg) translate(0, -38vh);
        }

        .ring-labels span.l5 {
            transform: rotate(178deg) translate(0, -38vh);
        }

        .ring-labels span.l6 {
            transform: rotate(224deg) translate(0, -38vh);
        }

        .ring-labels span.l7 {
            transform: rotate(266deg) translate(0, -38vh);
        }

        .ring-labels span.l8 {
            transform: rotate(312deg) translate(0, -38vh);
        }

        .globe {
            position: absolute;
            inset: 32%;
            border-radius: 50%;
            animation: spin 38s linear infinite reverse;
            transform-style: preserve-3d;
        }

        .globe svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .focal-dot {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 2.6s ease-in-out infinite;
            box-shadow: 0 0 0 0 rgba(192, 86, 59, 0.35);
        }

        .meta-tl {
            position: absolute;
            top: 96px;
            left: 56px;
            font: 10px/1.5 var(--mono);
            color: var(--muted);
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .meta-tl b {
            display: block;
            color: var(--ink);
            margin-bottom: 4px;
            letter-spacing: 0.12em;
        }

        .issue {
            position: absolute;
            top: 96px;
            right: 56px;
            font: 9px/1.3 var(--mono);
            color: var(--muted);
            letter-spacing: 0.18em;
            text-align: right;
            text-transform: uppercase;
        }

        .issue .num {
            font: 18px/1 var(--serif);
            font-style: italic;
            color: var(--ink);
            display: block;
            letter-spacing: 0;
            margin-bottom: 4px;
        }

        .headline {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            text-align: center;
            max-width: 70vw;
            margin: 0 auto;
            font: clamp(22px, 4vw, 42px)/1.15 var(--serif);
            letter-spacing: -0.005em;
            animation: type-in 1.4s cubic-bezier(.2, .7, .2, 1) both;
        }

        .headline .em {
            font-style: italic;
            color: var(--ink);
        }

        .headline .accent {
            font-style: italic;
            color: var(--accent);
            padding-left: 4px;
        }

        .headline .line {
            display: block;
        }

        .baseline {
            position: absolute;
            bottom: 56px;
            left: 36px;
            right: 36px;
            height: 1px;
            background: rgba(26, 24, 22, 0.25);
        }

        .footer-label {
            position: absolute;
            bottom: 28px;
            left: 0;
            right: 0;
            text-align: center;
            font: 10px/1 var(--mono);
            color: var(--muted);
            letter-spacing: 0.18em;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(192, 86, 59, 0.45);
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                box-shadow: 0 0 0 18px rgba(192, 86, 59, 0);
                transform: translate(-50%, -50%) scale(1.25);
            }
        }

        @keyframes type-in {
            from {
                opacity: 0;
                letter-spacing: 0.06em;
            }

            to {
                opacity: 1;
                letter-spacing: -0.005em;
            }
        }

        @media (max-width: 900px) {
            .meta-tl {
                left: 20px;
            }

            .issue {
                right: 20px;
            }
        }
    </style>
</head>
